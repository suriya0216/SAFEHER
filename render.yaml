services:
  - type: web
    name: safeher
    runtime: python
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SAFEHER_HOST
        value: 0.0.0.0
