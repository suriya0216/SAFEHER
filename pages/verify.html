<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeHer - Auto Verify</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="app-layout">
  <aside class="app-sidebar">
    <a href="../index.html" class="sidebar-logo"><div class="shield"><svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z"/></svg></div><span class="sidebar-logo-text">SafeHer</span></a>
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Dashboard</span></a>
    <a href="verify.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>Auto Verify</span></a>
    <div class="sidebar-section">Safety</div>
    <a href="map.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg><span>Live Map</span></a>
    <a href="sos.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg><span>SOS Alert</span><span class="sidebar-badge">!</span></a>
    <a href="danger.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm1 14h-2v2h2v-2zm0-6h-2v4h2V10z"/></svg><span>Danger Zone</span></a>
    <a href="rating.html" class="sidebar-item"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg><span>Driver Rating</span></a>
    <div class="sidebar-footer">SafeHer v1.0<br>Women Safety App</div>
  </aside>
  <main class="app-content">
    <div class="topbar">
      <a href="../index.html" class="topbar-logo"><div class="shield"><svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z"/></svg></div>SafeHer</a>
      <div class="topbar-right"><div class="live-badge"><div class="dot"></div>Smart Registry</div><div class="user-avatar">PL</div></div>
    </div>
    <div class="page-wrap">
      <div class="page-title">Verify Auto <em>Safety</em></div>
      <div class="page-sub">Enter any Indian registration number - get an instant safety profile</div>
      <div class="card verify-search-box">
        <div class="verify-row">
          <input class="plate-input" id="plateInp" placeholder="TN49AQ1621, TN 49 AQ 1621, or TN 07 1234" maxlength="18" oninput="formatPlateField()">
          <button class="verify-go" onclick="doVerify()">Verify Now</button>
        </div>
        <div class="quick-chips">
          <span class="chip-label">Try:</span>
          <span class="chip" onclick="tryPlate('TN09AB4521')">TN 09 AB 4521</span>
          <span class="chip" onclick="tryPlate('TN071234')">TN 07 1234</span>
          <span class="chip" onclick="tryPlate('TN22CD8834')">TN 22 CD 8834</span>
          <span class="chip" onclick="tryPlate('KA05MN3310')">KA 05 MN 3310</span>
        </div>
      </div>
      <div class="verify-loading" id="vLoading"><div class="loader-ring"></div><div class="load-steps" id="loadSteps"></div></div>
      <div class="verify-result card" id="vResult"></div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="../js/verify.js"></script>
</body>
</html>
