<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeHer Mobile</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", sans-serif;
      color: #1f2937;
      background:
        radial-gradient(circle at top left, rgba(255, 45, 85, 0.16), transparent 26%),
        radial-gradient(circle at top right, rgba(90, 200, 250, 0.18), transparent 24%),
        linear-gradient(180deg, #fff9fc 0%, #f5f8fc 100%);
    }

    .card {
      max-width: 360px;
      padding: 28px 26px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 24px 54px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    .logo {
      width: 58px;
      height: 58px;
      margin: 0 auto 16px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ff2d55, #ff3b30, #ff9f0a);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">S</div>
    <h1>SafeHer</h1>
    <p>Preparing the mobile app experience. The live SafeHer website will load inside the app.</p>
  </div>
</body>
</html>
