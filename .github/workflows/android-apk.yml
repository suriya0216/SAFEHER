name: Build SafeHer Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - "android/**"
      - "capacitor.config.json"
      - "mobile-shell/**"
      - "package.json"
      - "package-lock.json"
      - "download.html"
      - "js/download.js"
      - ".gitignore"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeHer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to GitHub release
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk SafeHer-debug.apk
          if gh release view mobile-latest > /dev/null 2>&1; then
            gh release upload mobile-latest SafeHer-debug.apk --clobber
          else
            gh release create mobile-latest SafeHer-debug.apk --title "SafeHer Android APK" --notes "Latest free Android APK build generated from GitHub Actions."
          fi
